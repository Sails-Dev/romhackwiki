<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Database</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #121212;
            --primary: #444444;
            --text: #f0f0f0;
            --muted: #888888;
            --border: #333333;
            --accent: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            padding: 0.75rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            white-space: nowrap;
            color: var(--text);
        }

        .search-container {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            border-radius: 4px;
            border: 2px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        #loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--muted);
            margin-top: 3rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 4px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0;
            color: #e2e8f0;
        }

        .types {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .type-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            color: white;
            letter-spacing: 0.5px;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 1rem 0 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            background-color: rgba(255,255,255,0.05);
            padding: 0.35rem 0.6rem;
            border-radius: 4px;
        }

        .stat-name {
            color: var(--muted);
        }

        .stat-value {
            font-weight: bold;
            color: #f1f5f9;
        }

        .pill-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .pill {
            background-color: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        
        .empty-state {
            color: var(--muted);
            font-style: italic;
            font-size: 0.85rem;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0;
        }

        .tab-btn {
            background-color: transparent;
            color: var(--muted);
            border: 2px solid var(--border);
            padding: 0.35rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tab-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--text);
        }

        .trainer-team {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .trainer-mon {
            background-color: rgba(0,0,0,0.2);
            padding: 0.75rem;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .mon-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
        }

        .mon-details {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }
        
        .moves-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.35rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Romhack Pokédex</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by name, or use type:ice, loc:cave, ability:...">
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pokemon', event)">Pokémon</button>
            <button class="tab-btn" onclick="switchTab('trainers', event)">Trainer Sets</button>
            <button class="tab-btn" onclick="switchTab('abilities', event)">Abilities</button>
            <button class="tab-btn" onclick="switchTab('areas', event)">Areas</button>
        </div>
    </header>

    <div class="container">
        <div id="pokedexGrid" class="grid"></div>
    </div>

    <!-- Load the data from JS file instead of JSON to bypass local CORS rules -->
    <script src="pokedex_data.js"></script>
    <script src="trainers_data.js"></script>
    <script src="abilities_data.js"></script>
    <script src="areas_data.js"></script>

    <script>
        const grid = document.getElementById('pokedexGrid');
        const searchInput = document.getElementById('searchInput');
        let currentTab = 'pokemon';

        function titleCase(str) {
            return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
        }

        function switchTab(tab, event) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            searchInput.value = '';
            
            if (tab === 'pokemon') {
                searchInput.placeholder = "Search by name, or use type:ice, loc:cave, ability:...";
                if (typeof pokedexData !== 'undefined') renderDex(pokedexData.slice(0, 1500));
            } else if (tab === 'trainers') {
                searchInput.placeholder = "Search by trainer name, class, or pokémon...";
                if (typeof trainersData !== 'undefined') renderTrainers(trainersData.slice(0, 50));
            } else if (tab === 'abilities') {
                searchInput.placeholder = "Search by ability or pokémon...";
                if (typeof abilitiesData !== 'undefined') renderAbilities(abilitiesData);
            } else if (tab === 'areas') {
                searchInput.placeholder = "Search by area or pokémon...";
                if (typeof areasData !== 'undefined') renderAreas(areasData);
            }
        }

        // Initialize
        if (typeof pokedexData !== 'undefined') {
            renderDex(pokedexData.slice(0, 1500));
        } else {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #ef4444; font-size: 1.2rem; padding: 3rem;">Error: pokedex_data.js is missing. Please run update_dex.bat first!</div>';
        }

        // Search listener
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (currentTab === 'pokemon') {
                if (typeof pokedexData === 'undefined') return;
                if(!query) {
                    renderDex(pokedexData.slice(0, 1500));
                    return;
                }
                
                let typeFilter = null;
                let locFilter = null;
                let abilityFilter = null;
                
                let searchTerms = query.split(' ');
                let nameTerms = [];
                
                searchTerms.forEach(term => {
                    if (term.startsWith('type:') || term.startsWith('t:')) {
                        typeFilter = term.split(':')[1];
                    } else if (term.startsWith('loc:') || term.startsWith('l:')) {
                        locFilter = term.split(':')[1];
                    } else if (term.startsWith('ability:') || term.startsWith('a:')) {
                        abilityFilter = term.split(':')[1];
                    } else {
                        nameTerms.push(term);
                    }
                });
                
                let nameQuery = nameTerms.join(' ');
                
                const filtered = pokedexData.filter(p => {
                    let match = true;
                    if (typeFilter && !p.types.some(t => t.toLowerCase() === typeFilter || t.toLowerCase().includes(typeFilter))) match = false;
                    if (locFilter && !p.locations.some(l => l.toLowerCase().includes(locFilter))) match = false;
                    if (abilityFilter && !p.abilities.some(a => a.toLowerCase().includes(abilityFilter))) match = false;
                    
                    if (nameQuery) {
                        // if we only typed generic text, search everything
                        if (!typeFilter && !locFilter && !abilityFilter) {
                            match = match && (p.name.toLowerCase().includes(nameQuery) ||
                               p.types.some(t => t.toLowerCase().includes(nameQuery)) ||
                               p.abilities.some(a => a.toLowerCase().includes(nameQuery)) ||
                               p.locations.some(l => l.toLowerCase().includes(nameQuery)));
                        } else {
                            // if we have specific filters, just search name
                            match = match && p.name.toLowerCase().includes(nameQuery);
                        }
                    }
                    return match;
                });
                renderDex(filtered.slice(0, 1500));
            } else if (currentTab === 'trainers') {
                if (typeof trainersData === 'undefined') return;
                if(!query) {
                    renderTrainers(trainersData.slice(0, 50));
                    return;
                }
                const filtered = trainersData.filter(t => {
                    return t.name.toLowerCase().includes(query) ||
                           t.team.some(mon => mon.species.toLowerCase().includes(query));
                });
                renderTrainers(filtered.slice(0, 50));
            } else if (currentTab === 'abilities') {
                if (typeof abilitiesData === 'undefined') return;
                if(!query) {
                    renderAbilities(abilitiesData);
                    return;
                }
                const filtered = abilitiesData.filter(a => {
                    return a.name.toLowerCase().includes(query) ||
                           a.pokemon.some(p => p.toLowerCase().includes(query));
                });
                renderAbilities(filtered);
            } else if (currentTab === 'areas') {
                if (typeof areasData === 'undefined') return;
                if(!query) {
                    renderAreas(areasData);
                    return;
                }
                const filtered = areasData.filter(a => 
                    a.name.toLowerCase().includes(query) || 
                    (a.encounters && Object.values(a.encounters).flat().some(p => p.toLowerCase().includes(query)))
                );
                renderAreas(filtered);
            }
        });

        function getTypeColor(type) {
            const colors = {
                'Normal': '#A8A77A', 'Fire': '#EE8130', 'Water': '#6390F0',
                'Electric': '#F7D02C', 'Grass': '#7AC74C', 'Ice': '#96D9D6',
                'Fighting': '#C22E28', 'Poison': '#A33EA1', 'Ground': '#E2BF65',
                'Flying': '#A98FF3', 'Psychic': '#F95587', 'Bug': '#A6B91A',
                'Rock': '#B6A136', 'Ghost': '#735797', 'Dragon': '#6F35FC',
                'Dark': '#705746', 'Steel': '#B7B7CE', 'Fairy': '#D685AD'
            };
            return colors[type] || '#777';
        }

        function renderDex(mons) {
            grid.innerHTML = '';
            
            if(mons.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--muted); font-size: 1.2rem;">No Pokémon found matching your search.</div>';
                return;
            }

            mons.forEach(p => {
                const bst = p.stats.hp + p.stats.atk + p.stats.def + p.stats.spa + p.stats.spd + p.stats.spe;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                card.onclick = () => {
                    const ls = document.getElementById('ls-' + p.id);
                    if (ls) {
                        ls.style.display = ls.style.display === 'none' ? 'block' : 'none';
                    }
                };
                
                let typesHtml = p.types.map(t => `<span class="type-badge" style="background-color: ${getTypeColor(t)}">${t}</span>`).join('');
                
                let abilitiesHtml = p.abilities.length > 0 
                    ? p.abilities.map(a => `<span class="pill">${a}</span>`).join('') 
                    : '<span class="empty-state">None</span>';
                    
                let evosHtml = p.evolutions.length > 0 
                    ? p.evolutions.map(e => `<span class="pill">${titleCase(e.replace('SPECIES_', '').replace(/_/g, ' '))}</span>`).join('') 
                    : '<span class="empty-state">Does not evolve</span>';

                let locsHtml = p.locations.length > 0
                    ? p.locations.map(l => `<span class="pill">${l}</span>`).join('')
                    : '<span class="empty-state">Not found in the wild</span>';

                card.innerHTML = `
                    <div class="card-header">
                        <h2 class="card-title">${p.name}</h2>
                    </div>
                    
                    <div class="types">
                        ${typesHtml}
                    </div>

                    <div class="section-title">Abilities</div>
                    <div class="pill-list">${abilitiesHtml}</div>

                    <div class="section-title">Evolutions</div>
                    <div class="pill-list">${evosHtml}</div>
                    
                    <div id="ls-${p.id}" style="display: none; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                        <div class="section-title">Base Stats (Total: ${bst})</div>
                        <div class="stats-grid">
                            <div class="stat-row"><span class="stat-name">HP</span><span class="stat-value">${p.stats.hp}</span></div>
                            <div class="stat-row"><span class="stat-name">Attack</span><span class="stat-value">${p.stats.atk}</span></div>
                            <div class="stat-row"><span class="stat-name">Defense</span><span class="stat-value">${p.stats.def}</span></div>
                            <div class="stat-row"><span class="stat-name">Sp. Atk</span><span class="stat-value">${p.stats.spa}</span></div>
                            <div class="stat-row"><span class="stat-name">Sp. Def</span><span class="stat-value">${p.stats.spd}</span></div>
                            <div class="stat-row"><span class="stat-name">Speed</span><span class="stat-value">${p.stats.spe}</span></div>
                        </div>
                        
                        <div class="section-title">Wild Locations</div>
                        <div class="pill-list">${locsHtml}</div>

                        <div class="section-title">Level Up Learnset</div>
                        ${p.learnset && p.learnset.length > 0 ? `
                            <div style="display: grid; grid-template-columns: 1fr 3fr; gap: 0.5rem; font-size: 0.85rem; max-height: 200px; overflow-y: auto; padding-right: 0.5rem; margin-top: 0.5rem;">
                                ${p.learnset.map(m => `
                                    <div style="color: var(--muted);">${m.level === 0 ? 'Evo.' : `Lv. ${m.level}`}</div>
                                    <div style="color: var(--text); font-weight: bold;">${m.move}</div>
                                `).join('')}
                            </div>
                        ` : '<span class="empty-state">No learnset data available</span>'}
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function calculateSpeed(monData) {
            let speciesName = titleCase(monData.species.replace('SPECIES_', '').replace(/_/g, ' '));
            if (speciesName.startsWith("Alolan ")) speciesName = "Alolan " + titleCase(speciesName.replace("Alolan ", ""));
            if (speciesName.startsWith("Galarian ")) speciesName = "Galarian " + titleCase(speciesName.replace("Galarian ", ""));
            if (speciesName.startsWith("Hisuian ")) speciesName = "Hisuian " + titleCase(speciesName.replace("Hisuian ", ""));
            if (speciesName.startsWith("Paldean ")) speciesName = "Paldean " + titleCase(speciesName.replace("Paldean ", ""));
            
            // The python script already generated display_name with Alolan/Galarian/etc., but pokedexData has it.
            let pokedexEntry = typeof pokedexData !== 'undefined' ? pokedexData.find(p => p.name === speciesName) : null;
            // wait, pokedexData from pokedex_data.js.
            let base = pokedexEntry ? pokedexEntry.stats.spe : 0;
            
            let level = parseInt(monData.level) || 1;
            
            let iv = 31;
            if (monData.ivs) {
                let match = monData.ivs.match(/(\d+)\s*Spe/i);
                if (match) iv = parseInt(match[1]);
            }
            
            let ev = 0;
            if (monData.evs) {
                let match = monData.evs.match(/(\d+)\s*Spe/i);
                if (match) ev = parseInt(match[1]);
            }
            
            let speed = Math.floor((Math.floor((2 * base + iv + Math.floor(ev / 4)) * level / 100) + 5));
            
            let nature = (monData.nature || 'Neutral Nature').split(' ')[0].toLowerCase();
            const speedUp = ['timid', 'hasty', 'jolly', 'naive'];
            const speedDown = ['brave', 'relaxed', 'quiet', 'sassy'];
            
            if (speedUp.includes(nature)) speed = Math.floor(speed * 1.1);
            else if (speedDown.includes(nature)) speed = Math.floor(speed * 0.9);
            
            return speed;
        }

        function renderTrainers(trainers) {
            grid.innerHTML = '';
            
            if(trainers.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--muted); font-size: 1.2rem;">No trainers found matching your search.</div>';
                return;
            }

            trainers.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let teamHtml = t.team.map(mon => {
                    let details = [];
                    if (mon.level) details.push(`Lv. ${mon.level}`);
                    if (mon.ability) details.push(`${titleCase(mon.ability)}`);
                    details.push(mon.nature || 'Neutral Nature');
                    if (mon.item) details.push(`@ ${titleCase(mon.item.replace('ITEM_', '').replace(/_/g, ' '))}`);
                    
                    let speed = calculateSpeed(mon);
                    let speedHtml = `<div style="margin-top: 0.4rem;"><span class="pill" style="background-color: rgba(234, 179, 8, 0.1); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); padding: 0.15rem 0.5rem;">⚡ Speed: ${speed}</span></div>`;
                    
                    let movesHtml = (mon.moves || []).map(m => `<span class="pill" style="background-color: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1);">${titleCase(m.replace('MOVE_', '').replace(/_/g, ' '))}</span>`).join('');
                    
                    return `
                        <div class="trainer-mon">
                            <div class="mon-header">
                                <span>${titleCase(mon.species.replace('SPECIES_', '').replace(/_/g, ' '))}</span>
                            </div>
                            <div class="mon-details">${details.join(' • ')}</div>
                            <div class="moves-list">${movesHtml}</div>
                            ${speedHtml}
                        </div>
                    `;
                }).join('');
                card.innerHTML = `
                    <div class="card-header">
                        <h2 class="card-title">${t.name}</h2>
                        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end;">
                            ${t.double_battle ? '<span class="pill" style="background-color: rgba(239, 68, 68, 0.2); color: #fca5a5; border-color: rgba(239, 68, 68, 0.4); font-size: 0.75rem;">Double Battle</span>' : ''}
                            ${t.partner ? `<span class="pill" style="background-color: rgba(245, 158, 11, 0.2); color: #fcd34d; border-color: rgba(245, 158, 11, 0.4); font-size: 0.75rem;">Fights alongside ${t.partner}</span>` : ''}
                        </div>
                    </div>
                    <div class="section-title">Party (${t.team.length})</div>
                    <div class="trainer-team">
                        ${teamHtml}
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function renderAbilities(data) {
            const grid = document.getElementById('pokedexGrid');
            grid.innerHTML = '';
            
            data.forEach(a => {
                if (a.pokemon.length === 0) return; // Hide unused abilities
                
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header">
                        <h2 class="card-title">${a.name}</h2>
                    </div>
                    <div class="section-title" style="color: var(--text); margin-bottom: 1rem; font-style: italic;">
                        "${a.description}"
                    </div>
                    <div class="section-title">Pokémon (${a.pokemon.length})</div>
                    <div class="trainer-team" style="display: flex; flex-wrap: wrap; gap: 0.5rem; flex-direction: row;">
                        ${a.pokemon.map(p => `<span class="pill" style="background-color: var(--bg); border-color: var(--border);">${p}</span>`).join('')}
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function renderAreas(data) {
            const grid = document.getElementById('pokedexGrid');
            grid.innerHTML = '';
             data.forEach(area => {
                if (!area.encounters || Object.keys(area.encounters).length === 0) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                
                let encountersHtml = '';
                const typeLabels = {
                    'land_mons': 'Land',
                    'water_mons': 'Water',
                    'fishing_mons': 'Fishing',
                    'rock_smash_mons': 'Rock Smash',
                    'honey_mons': 'Honey Tree'
                };
                
                for (const [type, mons] of Object.entries(area.encounters)) {
                    if (mons.length === 0) continue;
                    const label = typeLabels[type] || type;
                    encountersHtml += `
                        <div class="section-title" style="margin-top: 0.8rem; font-size: 0.9rem; color: var(--text-muted);">${label} Encounters</div>
                        <div class="trainer-team" style="display: flex; flex-wrap: wrap; gap: 0.5rem; flex-direction: row; margin-top: 0.5rem;">
                            ${mons.map(p => `<span class="pill" style="background-color: var(--bg); border-color: var(--border);">${p}</span>`).join('')}
                        </div>
                    `;
                }
                
                card.innerHTML = `
                    <div class="card-header">
                        <h2 class="card-title">${area.name}</h2>
                    </div>
                    ${encountersHtml}
                `;
                
                grid.appendChild(card);
            });
        }
        
        // Initial render
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof pokedexData !== 'undefined') {
                renderDex(pokedexData.slice(0, 1500));
            }
        });
    </script>
</body>
</html>
