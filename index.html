<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Database</title>
    <style>

        :root {
            --bg: #000000;
            --card-bg: #121212;
            --primary: #444444;
            --text: #f0f0f0;
            --muted: #888888;
            --border: #333333;
            --accent: #aaaaaa;
            --row-hover: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overflow-x: hidden;
}

        header {
            background-color: var(--card-bg);
            padding: 0.75rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 100;
            flex-shrink: 0;
        }

        h1 { margin: 0; font-size: 1.5rem; white-space: nowrap; color: var(--text); }

        .search-container { flex: 1; max-width: 600px; position: relative; }
        #searchInput {
            width: 100%; padding: 0.5rem 1rem; font-size: 0.95rem; border-radius: 4px;
            border: 2px solid var(--border); background-color: var(--bg); color: var(--text); outline: none; transition: all 0.3s;
            box-sizing: border-box;
}
        #searchInput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            width: 100%;
        }

        /* SPLIT LAYOUT WITH ANIMATION */
        .list-view {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .expanded-view {
            width: 0;
            background-color: var(--card-bg);
            border-left: 0px solid transparent;
            overflow-y: auto;
            overflow-x: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            padding: 0;
            opacity: 0;
            visibility: hidden;
        }

        .container.has-expanded .expanded-view {
            width: 450px;
            padding: 2rem;
            border-left: 1px solid var(--border);
            opacity: 1;
            visibility: visible;
        }
        /* Fallback for other tabs using grid */
        .grid-trainers {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }
        
        .grid-cards {
            display: grid;
            align-items: start;
            align-content: start;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        @media (max-width: 1000px) {
            .grid-cards { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .grid-cards { grid-template-columns: 1fr; }
        }
        
        .card {
            background-color: var(--card-bg); border-radius: 4px; padding: 1.5rem; border: 1px solid var(--border);
            width: 100%; box-sizing: border-box;
        }

        /* LIST ROW (Pokemon Tab) */
        .list-row {
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border-bottom: 1px solid var(--border);
            background-color: var(--card-bg);
            cursor: pointer;
            transition: background-color 0.15s;
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .list-row:hover { background-color: var(--row-hover); }
        .list-row:first-child { border-top: 1px solid var(--border); border-top-left-radius: 4px; border-top-right-radius: 4px; }
        .list-row:last-child { border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; }

        .row-name { width: 180px; flex-shrink: 0; font-size: 1.1rem; }
        .row-types { width: 120px; flex-shrink: 0; }
        .row-abilities { width: 160px; flex-shrink: 0; display: flex; flex-direction: column; font-size: 0.85rem; }
        .row-stats { display: flex; gap: 0.5rem; flex: 1; justify-content: flex-end; }
        .stat-col { display: flex; flex-direction: column; align-items: center; width: 35px; font-size: 0.85rem; }
        .stat-col div { color: var(--muted); font-size: 0.75rem; margin-bottom: 2px; }
        .stat-col.bst { width: 45px; color: #fde047; }

        /* BADGES AND PILLS */
        .type-badge {
            padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5); color: white; display: inline-block;
        }
        .pill { background-color: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.85rem; }
        .pill-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .empty-state { color: var(--muted); font-style: italic; font-size: 0.85rem; }

        /* EXPANDED VIEW */
        .close-btn {
            position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--muted);
            font-size: 1.5rem; cursor: pointer; transition: color 0.2s;
            z-index: 10;
        }
        .close-btn:hover { color: white; }
        
        /* Mobile specific close button styles */
        .mobile-back-btn {
            display: none;
        }
        
        .exp-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .exp-sprite { width: 96px; height: 96px; image-rendering: pixelated; object-fit: contain; }
        
        .section-title { font-size: 0.9rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 1.5rem 0 0.5rem 0; display: flex; align-items: center; gap: 0.5rem; }
        .section-title::after { content: ''; flex: 1; height: 1px; background-color: var(--border); }
        .section-title:first-child { margin-top: 0; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; font-size: 0.9rem; }
        .stat-row { display: flex; justify-content: space-between; background-color: rgba(255,255,255,0.05); padding: 0.35rem 0.6rem; border-radius: 4px; }
        .stat-name { color: var(--muted); }
        .stat-value { font-weight: bold; color: #f1f5f9; }
        
        .moves-scroll { max-height: 250px; overflow-y: auto; padding-right: 0.5rem; font-size: 0.85rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); }
        .move-row { display: flex; border-bottom: 1px solid var(--border); padding: 0.4rem; }
        .move-row:last-child { border-bottom: none; }
        .move-level { width: 50px; color: var(--muted); flex-shrink: 0; }
        .move-name { font-weight: bold; }

        /* TABS */
        .tabs { display: flex; justify-content: center; gap: 0.5rem; }
        .tab-btn { background-color: transparent; color: var(--muted); border: 2px solid var(--border); padding: 0.35rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: all 0.2s; }
        .tab-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }
        .tab-btn:hover:not(.active) { border-color: var(--primary); color: var(--text); }
        
        /* SUB TABS (Trainers) */
        .sub-tabs-container {
            display: none;
            width: 100%;
            background-color: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 1rem;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .sub-tabs { 
            display: flex; 
            gap: 0.5rem; 
            overflow-x: auto; 
            white-space: nowrap;
            padding-bottom: 0.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .sub-tabs::-webkit-scrollbar { height: 4px; }
        .sub-tab-btn {
            background-color: var(--card-bg); 
            color: var(--muted); 
            border: 1px solid var(--border); 
            padding: 0.4rem 1rem; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 600; 
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .sub-tab-btn.active { 
            background-color: var(--primary); 
            color: white; 
            border-color: var(--primary); 
        }
        .sub-tab-btn:hover:not(.active) { 
            background-color: var(--row-hover); 
            color: var(--text); 
        }
        
        /* TRAINER TEAM */
        .trainer-team { 
            display: flex; 
            flex-direction: row; 
            gap: 1rem; 
            overflow-x: auto; 
            padding-bottom: 1rem; 
        }
        .trainer-mon { 
            background-color: rgba(0,0,0,0.2); 
            padding: 1rem; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            border-top: 3px solid var(--primary); 
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .mon-header { 
            display: flex; 
            align-items: center;
            gap: 0.75rem;
            font-weight: bold; 
            color: #f1f5f9; 
            font-size: 1.1rem;
        }
        .mon-sprite {
            width: 96px;
            height: 96px;
            image-rendering: pixelated;
            object-fit: contain;
        }
        .mon-details { font-size: 0.85rem; color: var(--muted); width: 100%; }
        .mon-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.25rem;
            text-align: left;
            width: 100%;
        }
        .moves-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0.35rem; font-size: 0.85rem; margin-top: auto; }
        
        /* SCROLLBARS */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            /* Header Shrink & Sticky */
            header {
                flex-direction: column;
                padding: 0.5rem 1rem;
                gap: 0.5rem;
                position: sticky;
                top: 0;
                box-sizing: border-box;
                width: 100%;
            }
            header h1 { font-size: 1.2rem; }
            .search-container { width: 100%; max-width: 100%; box-sizing: border-box; }
            .tabs { width: 100%; overflow-x: auto; justify-content: flex-start; padding-bottom: 0.2rem; gap: 0.35rem; }
            .tab-btn { font-size: 0.75rem; padding: 0.35rem 0.6rem; white-space: nowrap; flex-shrink: 0; }

            /* Smooth Slider Overlay */
            .expanded-view {
                position: fixed !important;
                top: 0 !important;
                left: 0 !important;
                right: 0 !important;
                bottom: 0 !important;
                width: auto !important;
                height: auto !important;
                max-width: 100vw !important;
                z-index: 1000 !important;
                transform: translateX(105vw) !important;
                transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
                visibility: visible !important;
                opacity: 1 !important;
                border-left: none !important;
                box-sizing: border-box !important;
                padding: 1rem 0.5rem 10rem 0.5rem !important; /* Huge bottom padding to avoid URL bar cutoffs */
                overflow-y: auto !important;
                overflow-x: hidden !important;
            }
            .container.has-expanded .expanded-view {
                transform: translateX(0) !important;
            }
            
            /* Fix Stats Overflow */
            .stats-grid {
                grid-template-columns: 1fr !important; /* Forces a single column on phones so stats NEVER overflow horizontally */
                width: 100% !important;
                box-sizing: border-box !important;
            }
            
            /* Container & Card Padding Fix */
            .container { padding: 0.5rem !important; }
            .card { padding: 0.75rem !important; }
            
            


            /* Trainer Grid (Uniform Sizes) */
            .trainer-team {
                display: grid !important;
                grid-template-columns: 1fr !important;
                grid-auto-rows: 1fr !important; /* This forces all rows to be the identical max height */
                overflow-x: hidden !important;
                gap: 0.5rem !important;
                width: 100% !important;
                box-sizing: border-box !important;
            }
            .trainer-mon {
                width: 100% !important;
                min-width: 0 !important;
                max-width: none !important;
                height: 100% !important;
                padding: 0.5rem !important;
                box-sizing: border-box !important;
                margin: 0 !important;
            }
            .mon-sprite {
                width: 120px !important;
                height: 120px !important;
            }
            .mon-header { 
                flex-direction: column !important; 
                font-size: 1.1rem !important; 
                gap: 0.25rem !important; 
                align-items: center !important;
            }
            .mon-details { font-size: 0.9rem !important; }
            
            

            /* Buttons and Rows */
            .mobile-back-btn {
                display: inline-block;
                background: var(--primary);
                color: white;
                border: none;
                padding: 0.5rem 1rem;
                border-radius: 4px;
                margin-bottom: 1rem;
                cursor: pointer;
                font-weight: bold;
            }
            .close-btn { display: none; }
            
            .list-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .row-name { width: auto; }
            .row-types { width: auto; }
            .row-abilities { width: auto; }
            .row-stats { width: 100%; justify-content: space-between; }
        }
</style>
</head>
<body>

    <header>
        <h1>Romhack Pokédex</h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by name, or use type:ice, loc:cave, ability:...">
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pokemon', event)">Pokémon</button>
            <button class="tab-btn" onclick="switchTab('trainers', event)">Trainer Sets</button>
            <button class="tab-btn" onclick="switchTab('abilities', event)">Abilities</button>
            <button class="tab-btn" onclick="switchTab('areas', event)">Areas</button>
        </div>
    </header>

    <div class="sub-tabs-container" id="subTabsContainer">
        <div class="sub-tabs" id="subTabs"></div>
    </div>

    <div class="container" id="mainContainer">
        <div id="pokedexGrid" class="list-view"></div>
        <div id="expandedView" class="expanded-view" ></div>
    </div>

    <!-- Load the data from JS file instead of JSON to bypass local CORS rules -->
    <script src="pokedex_data.js"></script>
    <script src="trainers_data.js"></script>
    <script src="abilities_data.js"></script>
    <script src="areas_data.js"></script>

    <script>
        const grid = document.getElementById('pokedexGrid');
        const searchInput = document.getElementById('searchInput');
        let currentTab = 'pokemon';
        
        let currentTrainerSplit = 0;
        const trainerSplits = [
            { name: "Misty Split", endTrainerId: "TRAINER_LEADER_MISTY", trainers: [] },
            { name: "Brock Split", endTrainerId: "TRAINER_LEADER_BROCK", trainers: [] },
            { name: "Post-Brock Split", endTrainerId: null, trainers: [] }
        ];

        function processTrainerSplits() {
            if (typeof trainersData === 'undefined') return;
            trainerSplits.forEach(s => s.trainers = []);
            let currentSplitIdx = 0;
            for (let i = 0; i < trainersData.length; i++) {
                const t = trainersData[i];
                trainerSplits[currentSplitIdx].trainers.push(t);
                if (trainerSplits[currentSplitIdx].endTrainerId === t.id && currentSplitIdx < trainerSplits.length - 1) {
                    currentSplitIdx++;
                }
            }
        }

        function renderTrainerSubTabs() {
            const container = document.getElementById('subTabs');
            if(!container) return;
            container.innerHTML = '';
            trainerSplits.forEach((split, index) => {
                if (split.trainers.length === 0) return;
                const btn = document.createElement('button');
                btn.className = 'sub-tab-btn' + (index === currentTrainerSplit ? ' active' : '');
                btn.textContent = split.name + ` (${split.trainers.length})`;
                btn.onclick = () => {
                    currentTrainerSplit = index;
                    renderTrainerSubTabs();
                    const query = searchInput.value.toLowerCase().trim();
                    let currentData = trainerSplits[currentTrainerSplit].trainers;
                    if (query) {
                        currentData = currentData.filter(t => 
                            t.name.toLowerCase().includes(query) || 
                            (t.class && t.class.toLowerCase().includes(query)) ||
                            t.team.some(m => m.species.toLowerCase().includes(query))
                        );
                    }
                    renderTrainers(currentData);
                };
                container.appendChild(btn);
            });
        }

        function titleCase(str) {
            return str.toLowerCase().replace(/\b\w/g, s => s.toUpperCase());
        }

                function switchTab(tab, event) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            searchInput.value = '';
            closeExpandedView();
            
            const subTabsContainer = document.getElementById('subTabsContainer');
            if (subTabsContainer) subTabsContainer.style.display = (tab === 'trainers') ? 'block' : 'none';
            
            // Adjust layout classes based on tab
            const gridEl = document.getElementById('pokedexGrid');
            if (tab === 'pokemon') {
                gridEl.className = 'list-view';
                searchInput.placeholder = "Search by name, or use type:ice, loc:cave, ability:...";
                if (typeof pokedexData !== 'undefined') renderDex(pokedexData.slice(0, 1500));
            } else if (tab === 'trainers') {
                gridEl.className = 'list-view grid-trainers';
                searchInput.placeholder = "Search by trainer name, class, or pokémon...";
                if (typeof trainersData !== 'undefined') {
                    if (trainerSplits[0].trainers.length === 0) processTrainerSplits();
                    renderTrainerSubTabs();
                    renderTrainers(trainerSplits[currentTrainerSplit].trainers);
                }
            } else if (tab === 'abilities') {
                gridEl.className = 'list-view grid-cards';
                searchInput.placeholder = "Search by ability or pokémon...";
                if (typeof abilitiesData !== 'undefined') renderAbilities(abilitiesData);
            } else if (tab === 'areas') {
                gridEl.className = 'list-view grid-cards';
                searchInput.placeholder = "Search by area or pokémon...";
                if (typeof areasData !== 'undefined') renderAreas(areasData);
            } else {
                gridEl.className = 'list-view grid'; // fallback to grid for others
                if (tab === 'trainers') {
                    searchInput.placeholder = "Search by trainer name, class, or pokémon...";
                    if (typeof trainersData !== 'undefined') {
                        if (trainerSplits[0].trainers.length === 0) processTrainerSplits();
                        renderTrainerSubTabs();
                        renderTrainers(trainerSplits[currentTrainerSplit].trainers);
                    }
                } else if (tab === 'abilities') {
                    searchInput.placeholder = "Search by ability or pokémon...";
                    if (typeof abilitiesData !== 'undefined') renderAbilities(abilitiesData);
                } else if (tab === 'areas') {
                    searchInput.placeholder = "Search by area or pokémon...";
                    if (typeof areasData !== 'undefined') renderAreas(areasData);
                }
            }
        }

        function getTypeColor(type) {
            const colors = {
                'Normal': '#A8A77A', 'Fire': '#EE8130', 'Water': '#6390F0',
                'Electric': '#F7D02C', 'Grass': '#7AC74C', 'Ice': '#96D9D6',
                'Fighting': '#C22E28', 'Poison': '#A33EA1', 'Ground': '#E2BF65',
                'Flying': '#A98FF3', 'Psychic': '#F95587', 'Bug': '#A6B91A',
                'Rock': '#B6A136', 'Ghost': '#735797', 'Dragon': '#6F35FC',
                'Dark': '#705746', 'Steel': '#B7B7CE', 'Fairy': '#D685AD'
            };
            return colors[type] || '#777';
        }

        function getSpriteUrl(name) {
            let n = name.toLowerCase().replace(/[^a-z0-9-]/g, '');
            if (n.startsWith("alolan")) n = n.replace("alolan", "") + "-alola";
            if (n.startsWith("galarian")) n = n.replace("galarian", "") + "-galar";
            if (n.startsWith("hisuian")) n = n.replace("hisuian", "") + "-hisui";
            if (n.startsWith("paldean")) n = n.replace("paldean", "") + "-paldea";
            return `https://play.pokemonshowdown.com/sprites/gen5/${n}.png`;
        }

        function renderDex(mons) {
            grid.innerHTML = '';
            
            if(mons.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 3rem; color: var(--muted); font-size: 1.2rem;">No Pokémon found matching your search.</div>';
                return;
            }

            mons.forEach(p => {
                const bst = p.stats.hp + p.stats.atk + p.stats.def + p.stats.spa + p.stats.spd + p.stats.spe;
                
                const row = document.createElement('div');
                row.className = 'list-row';
                row.onclick = () => showExpandedView(p);
                
                let typesHtml = p.types.map(t => `<span class="type-badge" style="background-color: ${getTypeColor(t)}; margin-right: 0.25rem;">${t}</span>`).join('');
                
                let abilitiesHtml = p.abilities.length > 0 
                    ? p.abilities.map(a => `<div ${a.is_hidden ? 'style="color: #d8b4fe; font-style: italic;"' : ''}>${a.name}${a.is_hidden ? ' (H)' : ''}</div>`).join('') 
                    : '<span class="empty-state">None</span>';
                    
                let iconUrl = `https://play.pokemonshowdown.com/sprites/gen5icons/${p.dexNum || 0}.png`;
                
                row.innerHTML = `
                    <div class="row-name" style="display: flex; align-items: center; gap: 0.5rem;">
                        <img src="${iconUrl}" style="width: 40px; height: 30px; object-fit: contain; image-rendering: pixelated;" onerror="this.src='https://play.pokemonshowdown.com/sprites/gen5icons/0.png'">
                        <strong>${p.name}</strong>
                    </div>
                    <div class="row-types">${typesHtml}</div>
                    <div class="row-abilities">${abilitiesHtml}</div>
                    <div class="row-stats">
                        <div class="stat-col"><div>HP</div><strong>${p.stats.hp}</strong></div>
                        <div class="stat-col"><div>Atk</div><strong>${p.stats.atk}</strong></div>
                        <div class="stat-col"><div>Def</div><strong>${p.stats.def}</strong></div>
                        <div class="stat-col"><div>SpA</div><strong>${p.stats.spa}</strong></div>
                        <div class="stat-col"><div>SpD</div><strong>${p.stats.spd}</strong></div>
                        <div class="stat-col"><div>Spe</div><strong>${p.stats.spe}</strong></div>
                        <div class="stat-col bst"><div>BST</div><strong>${bst}</strong></div>
                    </div>
                `;
                
                grid.appendChild(row);
            });
        }

        function showExpandedView(p) {
            const exp = document.getElementById('expandedView');
            const container = document.getElementById('mainContainer');
            
            const bst = p.stats.hp + p.stats.atk + p.stats.def + p.stats.spa + p.stats.spd + p.stats.spe;
            
            let typesHtml = p.types.map(t => `<span class="type-badge" style="background-color: ${getTypeColor(t)}">${t}</span>`).join('');
            let abilitiesHtml = p.abilities.length > 0 ? p.abilities.map(a => `<span class="pill" ${a.is_hidden ? 'style="border-color: #a855f7; color: #d8b4fe;"' : ''}>${a.name}${a.is_hidden ? ' (Hidden)' : ''}</span>`).join('') : '<span class="empty-state">None</span>';
            let evosHtml = p.evolutions.length > 0 ? p.evolutions.map(e => `<span class="pill">${titleCase(e.replace('SPECIES_', '').replace(/_/g, ' '))}</span>`).join('') : '<span class="empty-state">Does not evolve</span>';
            let locsHtml = p.locations.length > 0 ? p.locations.map(l => `<span class="pill">${l}</span>`).join('') : '<span class="empty-state">Not found in the wild</span>';
            
            let learnsetHtml = p.learnset && p.learnset.length > 0 ? `
                <div class="moves-scroll">
                    ${p.learnset.map(m => `
                        <div class="move-row">
                            <div class="move-level">${m.level === 0 ? 'Evo' : m.level}</div>
                            <div class="move-name">${m.move}</div>
                        </div>
                    `).join('')}
                </div>
            ` : '<span class="empty-state">No learnset data</span>';
            
            let tmHtml = p.tm_moves && p.tm_moves.length > 0 ? `
                <div class="moves-scroll">
                    ${p.tm_moves.map(m => `
                        <div class="move-row">
                            <div class="move-level" style="color: var(--accent);">TM</div>
                            <div class="move-name">${m}</div>
                        </div>
                    `).join('')}
                </div>
            ` : '<span class="empty-state">No TM/Tutor moves</span>';

            exp.innerHTML = `
                <button class="mobile-back-btn" onclick="closeExpandedView()">&larr; Back to List</button>
                <button class="close-btn" onclick="closeExpandedView()">×</button>
                <div class="exp-header">
                    <img src="${getSpriteUrl(p.name)}" alt="${p.name}" class="exp-sprite" onerror="this.src='https://play.pokemonshowdown.com/sprites/gen5/0.png'">
                    <div>
                        <h2 style="margin: 0 0 0.5rem 0; font-size: 1.8rem; color: white;">${p.name}</h2>
                        <div class="types" style="display: flex; gap: 0.5rem;">${typesHtml}</div>
                    </div>
                </div>
                
                <div class="section-title">Base Stats (Total: ${bst})</div>
                <div class="stats-grid">
                    <div class="stat-row"><span class="stat-name">HP</span><span class="stat-value">${p.stats.hp}</span></div>
                    <div class="stat-row"><span class="stat-name">Attack</span><span class="stat-value">${p.stats.atk}</span></div>
                    <div class="stat-row"><span class="stat-name">Defense</span><span class="stat-value">${p.stats.def}</span></div>
                    <div class="stat-row"><span class="stat-name">Sp. Atk</span><span class="stat-value">${p.stats.spa}</span></div>
                    <div class="stat-row"><span class="stat-name">Sp. Def</span><span class="stat-value">${p.stats.spd}</span></div>
                    <div class="stat-row"><span class="stat-name">Speed</span><span class="stat-value">${p.stats.spe}</span></div>
                </div>
                
                <div class="section-title">Abilities</div>
                <div class="pill-list">${abilitiesHtml}</div>
                
                <div class="section-title">Evolutions</div>
                <div class="pill-list">${evosHtml}</div>
                
                <div class="section-title">Wild Locations</div>
                <div class="pill-list">${locsHtml}</div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem;">
                    <div>
                        <div class="section-title" style="margin-top:0;">Level Up</div>
                        ${learnsetHtml}
                    </div>
                    <div>
                        <div class="section-title" style="margin-top:0;">TMs / Tutors</div>
                        ${tmHtml}
                    </div>
                </div>
            `;
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    container.classList.add('has-expanded');
                });
            });
        }

        function closeExpandedView() {
            const exp = document.getElementById('expandedView');
            if(exp) {}
            const container = document.getElementById('mainContainer');
            if(container) container.classList.remove('has-expanded');
        }

        function calculateSpeed(monData) {
            let speciesName = titleCase(monData.species.replace('SPECIES_', '').replace(/_/g, ' '));
            if (speciesName.startsWith("Alolan ")) speciesName = "Alolan " + titleCase(speciesName.replace("Alolan ", ""));
            if (speciesName.startsWith("Galarian ")) speciesName = "Galarian " + titleCase(speciesName.replace("Galarian ", ""));
            if (speciesName.startsWith("Hisuian ")) speciesName = "Hisuian " + titleCase(speciesName.replace("Hisuian ", ""));
            if (speciesName.startsWith("Paldean ")) speciesName = "Paldean " + titleCase(speciesName.replace("Paldean ", ""));
            
            // The python script already generated display_name with Alolan/Galarian/etc., but pokedexData has it.
            let pokedexEntry = typeof pokedexData !== 'undefined' ? pokedexData.find(p => p.name === speciesName) : null;
            // wait, pokedexData from pokedex_data.js.
            let base = pokedexEntry ? pokedexEntry.stats.spe : 0;
            
            let level = parseInt(monData.level) || 1;
            
            let iv = 31;
            if (monData.ivs) {
                let match = monData.ivs.match(/(\d+)\s*Spe/i);
                if (match) iv = parseInt(match[1]);
            }
            
            let ev = 0;
            if (monData.evs) {
                let match = monData.evs.match(/(\d+)\s*Spe/i);
                if (match) ev = parseInt(match[1]);
            }
            
            let speed = Math.floor((Math.floor((2 * base + iv + Math.floor(ev / 4)) * level / 100) + 5));
            
            let nature = (monData.nature || 'Neutral Nature').split(' ')[0].toLowerCase();
            const speedUp = ['timid', 'hasty', 'jolly', 'naive'];
            const speedDown = ['brave', 'relaxed', 'quiet', 'sassy'];
            
            if (speedUp.includes(nature)) speed = Math.floor(speed * 1.1);
            else if (speedDown.includes(nature)) speed = Math.floor(speed * 0.9);
            
            return speed;
        }

                        function renderTrainers(trainers) {
            grid.innerHTML = '';
            
            if(trainers.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 3rem; color: var(--muted); font-size: 1.2rem;">No trainers found matching your search.</div>';
                return;
            }
            
            let grouped = [];
            let processed = new Set();
            
            trainers.forEach(t => {
                if (processed.has(t.id)) return;
                
                let group = [t];
                processed.add(t.id);
                
                if (t.partner) {
                    let partnerTrainer = trainers.find(p => p.name.toUpperCase().includes(t.partner.toUpperCase()) && !processed.has(p.id));
                    if (partnerTrainer) {
                        group.push(partnerTrainer);
                        processed.add(partnerTrainer.id);
                    }
                }
                
                grouped.push(group);
            });

            grouped.forEach(group => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.display = 'flex';
                card.style.flexDirection = 'column';
                card.style.gap = '2rem';
                
                let groupHtml = group.map(t => {
                    let teamHtml = t.team.map(mon => {
                        let lv = mon.level ? `<span style="color: white;">Lv. ${mon.level}</span>` : '';
                        let itemIconUrl = '';
                        if (mon.item) {
                            let itemRaw = mon.item.replace('ITEM_', '').toLowerCase().replace(/ /g, '-').replace(/_/g, '-');
                            itemIconUrl = `<img src="https://play.pokemonshowdown.com/sprites/itemicons/${itemRaw}.png" style="width: 16px; height: 16px; object-fit: contain; vertical-align: middle; margin-right: 4px;" onerror="this.style.display='none'">`;
                        }
                        let item = mon.item ? `@ ${titleCase(mon.item.replace('ITEM_', '').replace(/_/g, ' '))} ${itemIconUrl}` : '';
                        let ability = mon.ability ? `<span style="color: white;">${titleCase(mon.ability)}</span>` : '';
                        let nature = mon.nature || 'Neutral Nature';
                        
                        let topRow = [lv, item].filter(Boolean).join(' &bull; ');
                        let bottomRow = [ability, nature].filter(Boolean).join(' &bull; ');

                        let detailsHtml = `
                            <div style="text-align: left; width: 100%; margin: 0.5rem 0; font-size: 0.85rem; color: var(--muted); line-height: 1.4;">
                                <div>${topRow}</div>
                                <div>${bottomRow}</div>
                            </div>
                        `;
                        
                        let speed = calculateSpeed(mon);
                        let speedHtml = `<div><span class="pill" style="background-color: rgba(234, 179, 8, 0.1); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); padding: 0.15rem 0.5rem;">Speed: ${speed}</span></div>`;
                        
                        let movesHtml = (mon.moves || []).map(m => `<span class="pill" style="background-color: rgba(255,255,255,0.05); color: #cbd5e1; border: 1px solid rgba(255,255,255,0.1); text-align: center; word-break: break-word; font-size: 0.75rem; padding: 0.2rem;" title="${titleCase(m.replace('MOVE_', '').replace(/_/g, ' '))}">${titleCase(m.replace('MOVE_', '').replace(/_/g, ' '))}</span>`).join('');
                        
                        let speciesName = titleCase(mon.species.replace('SPECIES_', '').replace(/_/g, ' ')).replace(/ \([FM]\)/i, '');
                        let spriteUrl = getSpriteUrl(speciesName);
                        let escapedName = speciesName.replace(/'/g, "\\'");
                        
                        return `
                            <div class="trainer-mon" style="cursor: pointer;" onclick="if(typeof pokedexData !== 'undefined') { let e = pokedexData.find(x => x.name === '${escapedName}'); if(e) showExpandedView(e); }">
                                <div class="mon-header">
                                    <img src="${spriteUrl}" alt="${speciesName}" class="mon-sprite" onerror="this.src='https://play.pokemonshowdown.com/sprites/gen5/0.png'">
                                    <span>${speciesName}</span>
                                </div>
                                <div class="mon-details">${detailsHtml}</div>
                                ${speedHtml}
                                <div class="moves-list">${movesHtml}</div>
                            </div>
                        `;
                    }).join('');
                    
                    return `
                        <div>
                            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                                <h2 class="card-title" style="margin: 0; font-size: 1.4rem;">${t.name} <span style="color: var(--muted); font-size: 1rem; font-weight: normal;">(Party: ${t.team.length})</span></h2>
                                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: flex-end;">
                                    ${t.double_battle ? '<span class="pill" style="background-color: rgba(239, 68, 68, 0.2); color: #fca5a5; border-color: rgba(239, 68, 68, 0.4); font-size: 0.75rem; padding: 0.4rem 0.8rem;">Double Battle</span>' : ''}
                                    ${t.partner ? `<span class="pill" style="background-color: rgba(245, 158, 11, 0.2); color: #fcd34d; border-color: rgba(245, 158, 11, 0.4); font-size: 0.75rem; padding: 0.4rem 0.8rem;">Fights alongside ${t.partner}</span>` : ''}
                                </div>
                            </div>
                            <div class="trainer-team">
                                ${teamHtml}
                            </div>
                        </div>
                    `;
                }).join('');
                
                card.innerHTML = groupHtml;
                grid.appendChild(card);
            });
        }
        
        function renderAbilities(data) {
            const grid = document.getElementById('pokedexGrid');
            grid.innerHTML = '';
            
            if (data.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 3rem; color: var(--muted); font-size: 1.2rem; grid-column: 1 / -1; width: 100%;">No abilities found matching your search.</div>';
                return;
            }
            
            data.forEach(a => {
                if (a.pokemon.length === 0) return; // Hide unused abilities
                
                const card = document.createElement('div');
                card.className = 'card';
                card.style.padding = '1rem';
                card.style.cursor = 'pointer';
                
                let desc = a.description || '';
                if (desc) {
                    desc = desc.charAt(0).toUpperCase() + desc.slice(1).toLowerCase();
                }
                
                let monsHtml = `
                    <div class="ability-mons" style="display: none; margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem;">
                        <div class="section-title" style="margin-top: 0; font-size: 0.8rem;">Pokémon (${a.pokemon.length})</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 0.3rem;">
                            ${a.pokemon.map(p => `<span class="pill" style="background-color: var(--bg); border-color: var(--border); padding: 0.2rem 0.4rem; font-size: 0.75rem;">${p}</span>`).join('')}
                        </div>
                    </div>
                `;
                
                card.innerHTML = `
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <h2 class="card-title" style="margin: 0; font-size: 1.1rem;">${a.name}</h2>
                        <span style="color: var(--muted); font-size: 0.75rem;">Click to expand</span>
                    </div>
                    <div style="color: var(--text); font-style: italic; font-size: 0.9rem;">
                        "${desc}"
                    </div>
                    ${monsHtml}
                `;
                
                card.onclick = function() {
                    const monsDiv = this.querySelector('.ability-mons');
                    if (monsDiv.style.display === 'none') {
                        monsDiv.style.display = 'block';
                    } else {
                        monsDiv.style.display = 'none';
                    }
                };
                
                grid.appendChild(card);
            });
        }
        
        function renderAreas(data) {
            const grid = document.getElementById('pokedexGrid');
            grid.innerHTML = '';
            
            if (data.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 3rem; color: var(--muted); font-size: 1.2rem; grid-column: 1 / -1; width: 100%;">No areas found matching your search.</div>';
                return;
            }
            
            const targetAreas = [
                "Pallet Town", "Pallet Town Garden", "Route 21 North", "Route 1",
                "seabreeze glade", "cerulean path", "hollowgrove", "cerulean city",
                "strange house", "strange house backrooms", "viridian forest",
                "abandoned lodge", "route 2", "viridian city", "mt moon 1f",
                "mt moon ice caverns", "pewter city"
            ];
            
            const areaDict = {};
            data.forEach(area => {
                let norm = area.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                areaDict[norm] = area;
            });
            
            targetAreas.forEach(tName => {
                let normTarget = tName.toLowerCase().replace(/[^a-z0-9]/g, '');
                if (normTarget.startsWith('pallete')) normTarget = normTarget.replace('pallete', 'pallet');
                if (normTarget.includes('abandones')) normTarget = normTarget.replace('abandones', 'abandoned');
                
                const area = areaDict[normTarget];
                if (!area || !area.encounters || Object.keys(area.encounters).length === 0) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.style.padding = '1rem';
                
                let encountersHtml = '';
                const typeLabels = {
                    'land_mons': 'Land',
                    'water_mons': 'Water',
                    'fishing_mons': 'Fishing',
                    'rock_smash_mons': 'Rock Smash',
                    'honey_mons': 'Honey Tree'
                };
                
                for (const [type, mons] of Object.entries(area.encounters)) {
                    if (mons.length === 0) continue;
                    const label = typeLabels[type] || type;
                    encountersHtml += `
                        <div class="section-title" style="margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-muted);">${label}</div>
                        <div class="trainer-team" style="display: flex; flex-wrap: wrap; gap: 0.3rem; flex-direction: row; margin-top: 0.3rem; padding-bottom: 0;">
                            ${mons.map(p => { let escaped = p.replace(/'/g, "\\'"); return `<span class="pill" style="background-color: var(--bg); border-color: var(--border); padding: 0.2rem 0.4rem; font-size: 0.75rem; cursor: pointer;" onclick="if(typeof pokedexData !== 'undefined') { let e = pokedexData.find(x => x.name === '${escaped}'); if(e) showExpandedView(e); }">${p}</span>`; }).join('')}
                        </div>
                    `;
                }
                
                card.innerHTML = `
                    <div class="card-header" style="margin-bottom: 0;">
                        <h2 class="card-title" style="font-size: 1.1rem; margin: 0;">${area.name}</h2>
                    </div>
                    ${encountersHtml}
                `;
                
                grid.appendChild(card);
            });
        }
        

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (currentTab === 'pokemon') {
                if (!query) return renderDex(pokedexData.slice(0, 1500));
                
                let typeFilter = null;
                let locFilter = null;
                let abilityFilter = null;
                let nameQuery = query;

                const parts = query.split(' ');
                const textParts = [];

                for (const part of parts) {
                    if (part.startsWith('type:')) typeFilter = part.replace('type:', '');
                    else if (part.startsWith('loc:')) locFilter = part.replace('loc:', '');
                    else if (part.startsWith('ability:')) abilityFilter = part.replace('ability:', '');
                    else textParts.push(part);
                }
                nameQuery = textParts.join(' ');

                const filtered = pokedexData.filter(p => {
                    let matches = true;
                    if (nameQuery && !p.name.toLowerCase().includes(nameQuery)) matches = false;
                    if (typeFilter && !p.types.some(t => t.toLowerCase().includes(typeFilter))) matches = false;
                    if (abilityFilter && !p.abilities.some(a => a.toLowerCase().includes(abilityFilter))) matches = false;
                    if (locFilter && !p.locations.some(l => l.toLowerCase().includes(locFilter))) matches = false;
                    return matches;
                });
                renderDex(filtered.slice(0, 1500));
            } else if (currentTab === 'trainers') {
                if (trainerSplits[0].trainers.length === 0) processTrainerSplits();
                let baseData = trainerSplits[currentTrainerSplit].trainers;
                if (!query) return renderTrainers(baseData);
                const filtered = baseData.filter(t => 
                    t.name.toLowerCase().includes(query) || 
                    (t.class && t.class.toLowerCase().includes(query)) ||
                    t.team.some(m => m.species.toLowerCase().includes(query))
                );
                renderTrainers(filtered);
            } else if (currentTab === 'abilities') {
                if (!query) return renderAbilities(abilitiesData);
                const filtered = abilitiesData.filter(a => {
                    return a.name.toLowerCase().includes(query) || 
                           (a.description && a.description.toLowerCase().includes(query)) || 
                           a.pokemon.some(p => p.toLowerCase().includes(query));
                });
                renderAbilities(filtered);
            } else if (currentTab === 'areas') {
                if (!query) return renderAreas(areasData);
                const filtered = areasData.filter(a => {
                    if (a.name.toLowerCase().includes(query)) return true;
                    for (const mons of Object.values(a.encounters)) {
                        if (mons.some(p => p.toLowerCase().includes(query))) return true;
                    }
                    return false;
                });
                renderAreas(filtered);
            }
        });

        // Initial render
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof pokedexData !== 'undefined') {
                renderDex(pokedexData.slice(0, 1500));
            }
        });
    </script>
</body>
